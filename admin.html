<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GadgetStore - Admin</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">GadgetStore Admin</a>
        <ul class="nav nav-pills">
          <li class="nav-item">
            <a class="nav-link active" id="tabProducts" href="#">Sản phẩm</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" id="tabReviews" href="#">Đánh giá</a>
          </li>
        </ul>
        <a href="index.html" class="btn btn-outline-light">Về trang chủ</a>
      </div>
    </nav>

    <div class="container mt-4">
      <!-- Phần Quản lý Sản phẩm -->
      <div id="sectionProducts">
        <div class="d-flex justify-content-between mb-3">
          <h3>Danh sách sản phẩm</h3>
          <button
            class="btn btn-success"
            data-bs-toggle="modal"
            data-bs-target="#productModal"
          >
            <i class="bi bi-plus-circle"></i> Thêm sản phẩm
          </button>
        </div>
        <div class="table-responsive">
          <table class="table table-hover" id="productTable">
            <thead class="table-dark">
              <tr>
                <th>Hình</th>
                <th>Tên</th>
                <th>Giá</th>
                <th>Danh mục</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <!-- Phần Quản lý Đánh giá -->
      <div id="sectionReviews" class="d-none">
        <h3>Quản lý đánh giá</h3>
        <table class="table table-hover" id="reviewTable">
          <thead class="table-dark">
            <tr>
              <th>Sản phẩm</th>
              <th>Người đánh giá</th>
              <th>Điểm</th>
              <th>Nội dung</th>
              <th>Trạng thái</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Modal Form Sản phẩm -->
    <div class="modal fade" id="productModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Thêm sản phẩm mới</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="productForm">
              <input type="hidden" id="productId" />
              <div class="mb-3">
                <label class="form-label">Tên sản phẩm</label>
                <input type="text" class="form-control" id="name" required />
                <div class="invalid-feedback" id="errName"></div>
              </div>
              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label">Giá (VND)</label>
                  <input
                    type="number"
                    class="form-control"
                    id="price"
                    required
                  />
                  <div class="invalid-feedback" id="errPrice"></div>
                </div>
                <div class="col-6 mb-3">
                  <label class="form-label">Danh mục</label>
                  <select class="form-select" id="category" required>
                    <option value="">Chọn danh mục</option>
                    <option value="Điện thoại">Điện thoại</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Phụ kiện">Phụ kiện</option>
                  </select>
                  <div class="invalid-feedback" id="errCategory"></div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">URL hình ảnh</label>
                <input type="url" class="form-control" id="image" required />
                <div class="invalid-feedback" id="errImage"></div>
              </div>
              <div class="mb-3">
                <label class="form-label">Mô tả</label>
                <textarea
                  class="form-control"
                  id="description"
                  rows="3"
                ></textarea>
              </div>
              <div class="row">
                <div class="col-3 mb-3">
                  <label class="form-label">Thương hiệu</label>
                  <input type="text" class="form-control" id="brand" />
                </div>
                <div class="col-3 mb-3">
                  <label class="form-label">Màn hình</label>
                  <input type="text" class="form-control" id="screen" />
                </div>
                <div class="col-3 mb-3">
                  <label class="form-label">RAM</label>
                  <input type="text" class="form-control" id="ram" />
                </div>
                <div class="col-3 mb-3">
                  <label class="form-label">Bộ nhớ</label>
                  <input type="text" class="form-control" id="storage" />
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Lưu sản phẩm
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
